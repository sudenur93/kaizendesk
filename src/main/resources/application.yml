spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kaizendesk
    username: kaizen_user
    password: kaizen_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # Container içinden Keycloak'a erişim (docker ağı: 'keycloak' hostname, 8080 portu)
          issuer-uri: http://keycloak:8080/realms/kaizendesk

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://otel-collector:4318/v1/traces

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO