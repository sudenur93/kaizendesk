name: kaizendesk

services:
  postgres:
    image: postgres:16
    container_name: kaizendesk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  openldap:
    image: osixia/openldap:1.5.0
    container_name: kaizendesk-openldap
    command: ["--copy-service", "--loglevel", "warning"]
    environment:
      LDAP_ORGANISATION: "KaizenDesk"
      LDAP_DOMAIN: "kaizendesk.demo"
      LDAP_BASE_DN: "dc=kaizendesk,dc=demo"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_READONLY_USER: "false"
    ports:
      - "389:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./docker/openldap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost:389",
             "-b", "dc=kaizendesk,dc=demo",
             "-D", "cn=admin,dc=kaizendesk,dc=demo",
             "-w", "admin", "-s", "base"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: kaizendesk-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8082:80"
    depends_on:
      openldap:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    build:
      context: ./docker/keycloak
      dockerfile: Dockerfile
    container_name: kaizendesk-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080

    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: kaizendesk-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: kaizendesk-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: kaizendesk-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kaizendesk-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: kaizendesk-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  otel-collector:
    build:
      context: ./docker/otel
      dockerfile: Dockerfile
    container_name: kaizendesk-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: kaizendesk-fluent-bit
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    volumes:
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./docker/fluent-bit/parsers.conf:/fluent-bit/etc/custom-parsers.conf:ro
      - ./docker/fluent-bit/scripts:/fluent-bit/etc/scripts:ro
      - app_logs:/var/log/kaizendesk
    depends_on:
      opensearch:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaizendesk-api
    environment:
      KAIZENDESK_LOG_FILE: /var/log/kaizendesk/application.log
      KAIZENDESK_ATTACHMENTS_DIR: /var/lib/kaizendesk/attachments
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kaizendesk
      SPRING_DATASOURCE_USERNAME: kaizen_user
      SPRING_DATASOURCE_PASSWORD: kaizen_pass
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/kaizendesk
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kaizendesk/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@kaizendesk.local}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED:-true}
    volumes:
      - app_logs:/var/log/kaizendesk
      - attachment_data:/var/lib/kaizendesk/attachments
    ports:
      - "8080:8081"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kaizendesk-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
      - keycloak
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  app_logs:
  attachment_data:
  ldap_data:
  ldap_config:
  prometheus_data:
  grafana_data:
