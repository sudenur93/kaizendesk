server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://api:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Keycloak proxy (/auth → keycloak:8080, prefix stripped)
    # Host'u localhost:8081 olarak ilet → token issuer API'nin beklediğiyle eşleşsin
    location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://keycloak:8080;
        proxy_set_header Host localhost:8081;
        proxy_set_header X-Forwarded-Host localhost:8081;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 8081;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
