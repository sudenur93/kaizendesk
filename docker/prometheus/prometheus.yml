global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # KaizenDesk Spring Boot API metrikleri
  - job_name: 'kaizendesk-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api:8081']
        labels:
          application: 'kaizendesk'

  # Prometheus'un kendi metrikleri
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
